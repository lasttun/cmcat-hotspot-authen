<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าใช้งานอินเทอร์เน็ต | CMCAT</title>
    <!-- นำเข้า Tailwind CSS สำหรับการจัดหน้าตาแบบคลีนๆ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - สไตล์มินิมอล -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-[#F4F7F5] min-h-screen flex items-center justify-center p-4">

    <!-- การ์ดล็อกอินหลักสไตล์ Minimalist Evergreen -->
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-[#E2E8F0] w-full max-w-md transition-all">
        
        <!-- ส่วนหัว: โลโก้ และ ชื่อวิทยาลัย -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-[#059669] rounded-2xl mx-auto flex items-center justify-center shadow-md mb-4">
                <!-- ไอคอนแบบ Flat/Minimalist -->
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <h1 class="text-xl font-medium text-[#1E293B]">CMCAT Wi-Fi Authentication</h1>
            <p class="text-sm text-[#64748B] mt-1">วิทยาลัยเกษตรและเทคโนโลยีเชียงใหม่</p>
        </div>

        <!-- กล่องแจ้งเตือนสถานะ Error -->
        <div id="error-box" class="hidden mb-6 bg-red-50 border border-red-200 text-red-600 text-sm p-3 rounded-xl"></div>

        <!-- ฟอร์มกรอกข้อมูล -->
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-[#475569] mb-1">รหัสนักศึกษา</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-3 bg-[#F8FAFC] border border-[#CBD5E1] rounded-xl focus:outline-none focus:border-[#059669] focus:bg-white text-[#334155] transition-colors"
                    placeholder="ตัวอย่าง: 69310100xx">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-[#475569] mb-1">เลขบัตรประจำตัวประชาชน</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 bg-[#F8FAFC] border border-[#CBD5E1] rounded-xl focus:outline-none focus:border-[#059669] focus:bg-white text-[#334155] transition-colors"
                    placeholder="กรอกตัวเลข 13 หลักโดยไม่ต้องมีขีด">
            </div>

            <button type="submit" id="btn-submit"
                class="w-full bg-[#059669] hover:bg-[#047857] text-white py-3 rounded-xl font-medium transition-all shadow-sm flex items-center justify-center space-x-2">
                <span>เข้าสู่ระบบอินเทอร์เน็ต</span>
            </button>
            
            <!-- PDPA & พ.ร.บ. คอมพิวเตอร์ Notice -->
            <p class="text-[11px] text-[#94A3B8] leading-tight mt-3 text-center">
                ระบบมีความจำเป็นต้องบันทึกข้อมูลการจราจรทางคอมพิวเตอร์ (Log) รวมถึง IP และ MAC Address ของท่านเพื่อปฏิบัติตาม พ.ร.บ. ว่าด้วยการกระทำความผิดเกี่ยวกับคอมพิวเตอร์
            </p>
        </form>

        <!-- ฟอร์มลับสำหรับใช้ทำ HTTP POST ส่งกลับไปปลดล็อกอินเทอร์เน็ตบน MikroTik (พอร์ต 9 Sandbox) -->
        <form id="mikrotik-backlink" method="post" class="hidden" action="http://$(gateway-address)/login">
            <input type="hidden" name="username" id="mt-user">
            <input type="hidden" name="password" id="mt-pass">
            <input type="hidden" name="dst" id="mt-dst">
            <input type="hidden" name="popup" value="true">
        </form>

        <!-- ส่วนท้าย: ดีไซน์มินิมอล -->
        <div class="mt-8 pt-6 border-t border-[#F1F5F9] text-center">
            <p class="text-xs text-[#94A3B8]">© 2026 IT Data Center | CMCAT</p>
        </div>
    </div>

    <!-- ==================== LOGIC INTERACTION & FIREBASE ==================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // โครงสร้าง Firebase Configuration ที่เชื่อมต่อระบบจริง
        const firebaseConfig = {
            apiKey: "AIzaSyDSZM1HZqT9dmXcDlh35lIT3zgS4MhB5qQ",
            authDomain: "cmcat-hotspot-authen.firebaseapp.com",
            projectId: "cmcat-hotspot-authen",
            storageBucket: "cmcat-hotspot-authen.firebasestorage.app",
            messagingSenderId: "63200391589",
            appId: "1:63200391589:web:ed7f7f34254c0bf510f84c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ดักจับค่า Parameters ที่ MikroTik ส่งมาทาง URL Query String
        const urlParams = new URLSearchParams(window.location.search);
        const mac = urlParams.get('mac');
        const ip = urlParams.get('ip');
        const linkorig = urlParams.get('linkorig');
        const error = urlParams.get('error');

        if (error) {
            const errorBox = document.getElementById('error-box');
            errorBox.textContent = `แจ้งเตือนจากระบบเครือข่าย: ${error}`;
            errorBox.classList.remove('hidden');
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const btnSubmit = document.getElementById('btn-submit');
            const errorBox = document.getElementById('error-box');

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<span>กำลังตรวจสอบสิทธิ์...</span>`;
            errorBox.classList.add('hidden');

            try {
                // แปลงรหัสนักศึกษาให้อยู่ในฟอร์แมต Email จำลองเพื่อตรวจสอบกับ Firebase
                const emailFormat = `${usernameInput}@cmcat.local`; 

                // ตรวจสอบสิทธิ์ที่ Firebase Cloud
                const userCredential = await signInWithEmailAndPassword(auth, emailFormat, passwordInput);
                const user = userCredential.user;
                console.log("ยืนยันตัวตนสำเร็จ:", user.uid);

                // Callback: ส่งสัญญาณกลับไปบอก MikroTik ให้เปิดเน็ต
                const mtForm = document.getElementById('mikrotik-backlink');
                
                // ใช้ข้อมูลเดียวกันเพื่ออนุญาตผ่านฐานข้อมูลท้องถิ่นของ MikroTik
                document.getElementById('mt-user').value = usernameInput;
                document.getElementById('mt-pass').value = passwordInput;
                document.getElementById('mt-dst').value = linkorig || "https://www.google.com";

                // กดยิงส่งฟอร์มเพื่อปลดบล็อกเน็ตทันที
                mtForm.submit();

            } catch (err) {
                console.error("Firebase Auth Error:", err.message);
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<span>เข้าสู่ระบบอินเทอร์เน็ต</span>`;
                
                errorBox.textContent = "รหัสนักศึกษา หรือ เลขบัตรประชาชน ไม่ถูกต้อง กรุณาตรวจสอบอีกครั้ง";
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
